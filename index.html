<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANUGA UPLOADER | 3D Premium CDN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#00f0ff;
    --secondary:#ff00f7;
    --dark:#060612;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at 30% 30%,#101030,#060612 70%);
    overflow:hidden;
    color:white;
    position:relative;
}

/* Animated Glow Background */
body::before, body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    animation:float 14s infinite alternate ease-in-out;
}
body::before{
    background:#00f0ff;
    top:-100px;
    left:-100px;
}
body::after{
    background:#ff00f7;
    bottom:-100px;
    right:-100px;
}
@keyframes float{
    from{transform:translate(0,0);}
    to{transform:translate(120px,80px);}
}

/* Glass Card */
.container{
    position:relative;
    z-index:10;
    width:90%;
    max-width:420px;
    padding:35px;
    border-radius:25px;
    backdrop-filter:blur(25px);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 40px rgba(0,240,255,0.3);
    text-align:center;
    animation:fadeIn 1s ease forwards;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(30px);}
    to{opacity:1;transform:translateY(0);}
}

h1{
    margin:0;
    font-size:24px;
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-weight:900;
    letter-spacing:3px;
}

.subtitle{
    font-size:12px;
    margin-bottom:25px;
    color:#aaa;
}

/* Upload Box */
input[type=file]{display:none;}

.upload-zone{
    border:2px dashed rgba(255,255,255,0.6);
    padding:35px 15px;
    border-radius:18px;
    cursor:pointer;
    transition:0.4s;
    background:linear-gradient(
        145deg,
        rgba(0,240,255,0.15),
        rgba(255,0,247,0.15)
    );
    margin-bottom:20px;
    box-shadow:
        inset 0 0 15px rgba(255,255,255,0.08),
        0 0 25px rgba(0,240,255,0.4);
}

.upload-zone:hover{
    transform:scale(1.05);
    box-shadow:
        0 0 35px #00f0ff,
        0 0 50px #ff00f7;
}

.file-name{
    font-size:13px;
}

/* Button */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:700;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    color:black;
    transition:0.4s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px var(--primary);
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

/* Progress */
.progress-wrapper{
    display:none;
    margin-top:15px;
}
.progress-track{
    width:100%;
    height:8px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
}
.progress-fill{
    height:100%;
    width:0%;
    border-radius:10px;
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    transition:0.3s;
}

#progressPercent{
    font-size:12px;
    margin-top:5px;
}

/* Result */
#result{
    margin-top:20px;
    display:none;
}

.url-box{
    display:flex;
    margin-top:10px;
    background:rgba(0,0,0,0.6);
    padding:8px;
    border-radius:8px;
}
.url-box input{
    flex:1;
    background:none;
    border:none;
    color:white;
    outline:none;
    font-size:12px;
}
.copy-btn{
    padding:6px 12px;
    border-radius:6px;
    font-size:11px;
    background:#00f0ff;
    color:black;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>ANUGA UPLOADER</h1>
    <p class="subtitle">Premium 3D Media CDN</p>

    <label class="upload-zone" for="fileInput">
        <div id="fileName" class="file-name">
            Drag & Drop or Click to Select
        </div>
    </label>
    <input type="file" id="fileInput">

    <button id="uploadBtn" disabled>UPLOAD MEDIA</button>

    <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="progressPercent">0%</div>
    </div>

    <div id="result"></div>
</div>

<script>
const fileInput=document.getElementById("fileInput");
const uploadBtn=document.getElementById("uploadBtn");
const fileNameDisplay=document.getElementById("fileName");
const progressWrapper=document.getElementById("progressWrapper");
const progressFill=document.getElementById("progressFill");
const progressPercent=document.getElementById("progressPercent");
const resultDiv=document.getElementById("result");

fileInput.addEventListener("change",()=>{
    if(fileInput.files.length>0){
        const file=fileInput.files[0];
        const size=(file.size/1024/1024).toFixed(2);
        fileNameDisplay.innerHTML=`📄 ${file.name}<br><small>${size} MB</small>`;
        uploadBtn.disabled=false;
    }
});

uploadBtn.addEventListener("click",uploadFile);

function uploadFile(){
    const file=fileInput.files[0];
    if(!file) return;

    const formData=new FormData();
    formData.append("file",file);

    uploadBtn.style.display="none";
    progressWrapper.style.display="block";

    const xhr=new XMLHttpRequest();

    xhr.upload.addEventListener("progress",(e)=>{
        if(e.lengthComputable){
            const percent=Math.round((e.loaded/e.total)*100);
            progressFill.style.width=percent+"%";
            progressPercent.innerText=percent+"%";
        }
    });

    xhr.onload=()=>{
        progressWrapper.style.display="none";
        uploadBtn.style.display="block";
        uploadBtn.disabled=true;
        fileInput.value="";
        fileNameDisplay.innerText="Drag & Drop or Click to Select";

        if(xhr.status===200){
            const data=JSON.parse(xhr.responseText);
            if(data.success){
                showResult(data.url);
            }else{
                showError("Upload Failed");
            }
        }else{
            showError("Server Error");
        }
    };

    xhr.open("POST","/upload",true);
    xhr.send(formData);
}

function showResult(url){
    resultDiv.style.display="block";
    resultDiv.innerHTML=`
        <h3 style="color:#00ff88;">UPLOAD SUCCESSFUL</h3>
        <div class="url-box">
            <input type="text" value="${url}" id="urlText" readonly>
            <button class="copy-btn" onclick="copyURL()">COPY</button>
        </div>
    `;
}

function showError(msg){
    resultDiv.style.display="block";
    resultDiv.innerHTML=`<h3 style="color:red;">❌ ${msg}</h3>`;
}

function copyURL(){
    const urlText=document.getElementById("urlText");
    urlText.select();
    document.execCommand("copy");
}
</script>

</body>
</html>
