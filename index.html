<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANUGA UPLOADER | 3D Premium CDN</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
    --primary:#00f0ff;
    --secondary:#ff00f7;
    --dark:#060612;
}

/* Global */
*{box-sizing:border-box;margin:0;padding:0;}
body{
    font-family:'Orbitron',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#060612;
    perspective:1200px;
    overflow:hidden;
    color:white;
    position:relative;
}

/* 3D Moving Particles Background */
.scene{
    position:absolute;
    width:200%;
    height:200%;
    top:-50%;
    left:-50%;
    transform-style:preserve-3d;
    animation:rotateScene 60s linear infinite;
    background:radial-gradient(circle at 30% 30%,#101030,#060612 70%);
    overflow:hidden;
    z-index:1;
}

.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:linear-gradient(45deg,var(--primary),var(--secondary));
    border-radius:50%;
    box-shadow:0 0 15px var(--primary),0 0 20px var(--secondary);
    animation:float 20s infinite alternate ease-in-out;
}

@keyframes rotateScene{
    0%{transform:rotateX(0deg) rotateY(0deg);}
    100%{transform:rotateX(360deg) rotateY(360deg);}
}
@keyframes float{
    from{transform:translate3d(0,0,0);}
    to{transform:translate3d(200px,150px,50px);}
}

/* Glass Container */
.container{
    position:relative;
    z-index:10;
    width:90%;
    max-width:480px;
    padding:30px 20px;
    border-radius:25px;
    backdrop-filter:blur(30px);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 0 60px rgba(0,240,255,0.4);
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    animation:fadeIn 1s ease forwards;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* Header */
h1{
    font-size:28px;
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-weight:900;
    letter-spacing:3px;
    margin-bottom:8px;
}
.subtitle{font-size:13px;margin-bottom:20px;color:#aaa;}

/* Upload Box */
input[type=file]{display:none;}
.upload-zone{
    width:100%;
    min-height:120px;
    border:2px dashed rgba(255,255,255,0.6);
    border-radius:20px;
    cursor:pointer;
    transition:0.4s;
    background:linear-gradient(145deg, rgba(0,240,255,0.15), rgba(255,0,247,0.15));
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:20px;
    padding:20px;
    text-align:center;
    box-shadow:inset 0 0 15px rgba(255,255,255,0.08), 0 0 35px rgba(0,240,255,0.4);
}
.upload-zone:hover{
    transform:scale(1.05) rotateX(3deg) rotateY(3deg);
    box-shadow:0 0 45px #00f0ff,0 0 60px #ff00f7;
}
.file-name{font-size:14px;word-break:break-word;}

/* Button */
button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    font-weight:700;
    letter-spacing:2px;
    cursor:pointer;
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    color:black;
    transition:0.4s;
    margin-bottom:10px;
}
button:hover{transform:translateY(-3px);box-shadow:0 10px 30px var(--primary);}
button:disabled{opacity:0.5;cursor:not-allowed;}

/* Progress */
.progress-wrapper{display:none;margin-top:10px;width:100%;}
.progress-track{width:100%;height:8px;background:rgba(255,255,255,0.1);border-radius:10px;}
.progress-fill{height:100%;width:0%;border-radius:10px;background:linear-gradient(90deg,var(--primary),var(--secondary));transition:0.3s;}
#progressPercent{font-size:12px;margin-top:5px;text-align:right;}

/* Result */
#result{margin-top:15px;width:100%;}
.url-box{display:flex;margin-top:10px;background:rgba(0,0,0,0.6);padding:8px;border-radius:8px;gap:5px;}
.url-box input{flex:1;background:none;border:none;color:white;outline:none;font-size:12px;}
.copy-btn{padding:6px 12px;border-radius:6px;font-size:11px;background:#00f0ff;color:black;border:none;cursor:pointer;}

/* Responsive */
@media (max-width:600px){
    h1{font-size:22px; letter-spacing:2px;}
    .subtitle{font-size:11px;margin-bottom:15px;}
    .upload-zone{min-height:80px;padding:15px;}
    button{padding:12px;}
}
@media (min-width:1600px){
    .container{max-width:600px;padding:40px 30px;}
    .upload-zone{min-height:160px;}
}
</style>
</head>
<body>

<div class="scene" id="scene">
    <!-- Generate 50 particles -->
    <script>
        for(let i=0;i<50;i++){
            const p=document.createElement("div");
            p.className="particle";
            p.style.top=Math.random()*200+"%";
            p.style.left=Math.random()*200+"%";
            p.style.width=(2+Math.random()*4)+"px";
            p.style.height=p.style.width;
            p.style.animationDuration=(15+Math.random()*20)+"s";
            document.body.appendChild(p);
        }
    </script>
</div>

<div class="container">
    <h1>ANUGA UPLOADER</h1>
    <p class="subtitle">Premium 3D Media CDN</p>

    <label class="upload-zone" for="fileInput">
        <div id="fileName" class="file-name">Drag & Drop or Click to Select</div>
    </label>
    <input type="file" id="fileInput">

    <button id="uploadBtn" disabled>UPLOAD MEDIA</button>

    <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div id="progressPercent">0%</div>
    </div>

    <div id="result"></div>
</div>

<script>
const fileInput=document.getElementById("fileInput");
const uploadBtn=document.getElementById("uploadBtn");
const fileNameDisplay=document.getElementById("fileName");
const progressWrapper=document.getElementById("progressWrapper");
const progressFill=document.getElementById("progressFill");
const progressPercent=document.getElementById("progressPercent");
const resultDiv=document.getElementById("result");

fileInput.addEventListener("change",()=>{
    if(fileInput.files.length>0){
        const file=fileInput.files[0];
        const size=(file.size/1024/1024).toFixed(2);
        fileNameDisplay.innerHTML=`📄 ${file.name}<br><small>${size} MB</small>`;
        uploadBtn.disabled=false;
    }
});

uploadBtn.addEventListener("click",uploadFile);

function uploadFile(){
    const file=fileInput.files[0];
    if(!file) return;

    const formData=new FormData();
    formData.append("file",file);

    uploadBtn.style.display="none";
    progressWrapper.style.display="block";

    const xhr=new XMLHttpRequest();
    xhr.upload.addEventListener("progress",(e)=>{
        if(e.lengthComputable){
            const percent=Math.round((e.loaded/e.total)*100);
            progressFill.style.width=percent+"%";
            progressPercent.innerText=percent+"%";
        }
    });

    xhr.onload=()=>{
        progressWrapper.style.display="none";
        uploadBtn.style.display="block";
        uploadBtn.disabled=true;
        fileInput.value="";
        fileNameDisplay.innerText="Drag & Drop or Click to Select";

        if(xhr.status===200){
            const data=JSON.parse(xhr.responseText);
            if(data.success) showResult(data.url);
            else showError("Upload Failed");
        }else showError("Server Error");
    };
    xhr.open("POST","/upload",true);
    xhr.send(formData);
}

function showResult(url){
    resultDiv.style.display="block";
    resultDiv.innerHTML=`<h3 style="color:#00ff88;">UPLOAD SUCCESSFUL</h3>
        <div class="url-box">
            <input type="text" value="${url}" id="urlText" readonly>
            <button class="copy-btn" onclick="copyURL()">COPY</button>
        </div>`;
}
function showError(msg){
    resultDiv.style.display="block";
    resultDiv.innerHTML=`<h3 style="color:red;">❌ ${msg}</h3>`;
}
function copyURL(){
    const urlText=document.getElementById("urlText");
    urlText.select();
    document.execCommand("copy");
}
</script>

</body>
</html>
